name: 持续集成

on:
    pull_request:
        branches:
            - dev
            - main
    push:
        branches:
            - dev

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - name: 检出代码
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0

            - name: 配置 pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: 配置 Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  cache: pnpm
                  package-manager-cache: false

            - name: 安装依赖
              run: pnpm install --frozen-lockfile

            - name: 检测 CLI 发布版本变化
              id: cli-version
              if: github.event_name == 'pull_request' && github.base_ref == 'main'
              shell: bash
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
              run: |
                  set -euo pipefail
                  BASE_VERSION="$(git show "${BASE_SHA}:packages/cli/package.json" | node -p "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version")"
                  CURRENT_VERSION="$(node -p "require('./packages/cli/package.json').version")"

                  if [[ "$BASE_VERSION" == "$CURRENT_VERSION" ]]; then
                      echo 'changed=false' >> "$GITHUB_OUTPUT"
                      echo "CLI 版本保持 ${CURRENT_VERSION}，跳过发布元数据检查。"
                  else
                      echo 'changed=true' >> "$GITHUB_OUTPUT"
                      echo "CLI 版本由 ${BASE_VERSION} 更新为 ${CURRENT_VERSION}。"
                  fi

            - name: 验证发布元数据
              if: steps.cli-version.outputs.changed == 'true'
              run: pnpm release:verify

            - name: 执行仓库质量检查
              run: pnpm check

            - name: 安装 Playwright Chromium
              if: github.event_name == 'pull_request' && github.base_ref == 'main'
              run: pnpm exec playwright install --with-deps chromium

            - name: 执行浏览器交互测试
              if: github.event_name == 'pull_request' && github.base_ref == 'main'
              run: pnpm test:e2e

            - name: 验证 pnpm 和 npm tarball 消费链
              if: github.event_name == 'pull_request' && github.base_ref == 'main'
              run: pnpm smoke:package

            - name: 上传失败的 Playwright 报告
              if: failure() && github.event_name == 'pull_request' && github.base_ref == 'main'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: playwright-report
                  path: playwright-report/
                  if-no-files-found: ignore
                  retention-days: 7

    node20-compatibility:
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        runs-on: ubuntu-latest
        steps:
            - name: 检出代码
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: 配置仓库 pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: 配置仓库 Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  cache: pnpm
                  package-manager-cache: false

            - name: 安装依赖
              run: pnpm install --frozen-lockfile

            - name: 使用仓库工具链构建 Registry
              run: pnpm registry:build

            - name: 切换到 Node.js 20
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 20.19.0
                  package-manager-cache: false

            - name: 安装兼容 Node.js 20 的消费端 pnpm
              run: |
                  npm install --global pnpm@10.12.1
                  test "$(pnpm --version)" = "10.12.1"
              env:
                  npm_config_manage_package_manager_versions: 'false'

            - name: 在 Node.js 20 下执行 CLI 测试
              run: node node_modules/vitest/vitest.mjs run packages/cli/tests

            - name: 在 Node.js 20 下验证 pnpm tarball 消费链
              run: node scripts/smoke-package.mjs --manager pnpm
              env:
                  npm_config_manage_package_manager_versions: 'false'
