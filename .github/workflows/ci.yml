name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  cache: pnpm
                  package-manager-cache: false

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run repository checks
              run: pnpm check

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Run visual interaction tests
              run: pnpm test:e2e

            - name: Test the packed CLI in an isolated Vue app
              run: pnpm smoke:package

            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: playwright-report
                  path: playwright-report/
                  if-no-files-found: ignore
                  retention-days: 7

    node20-compatibility:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up repository pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Set up repository Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  cache: pnpm
                  package-manager-cache: false

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Registry with the repository toolchain
              run: pnpm registry:build

            - name: Switch to Node.js 20
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 20.19.0
                  package-manager-cache: false

            - name: Install a Node 20 compatible pnpm for the consumer
              run: |
                  npm install --global pnpm@10.12.1
                  test "$(pnpm --version)" = "10.12.1"
              env:
                  npm_config_manage_package_manager_versions: 'false'

            - name: Run CLI tests on Node 20
              run: node node_modules/vitest/vitest.mjs run packages/cli/tests

            - name: Test pnpm tarball consumption on Node 20
              run: node scripts/smoke-package.mjs --manager pnpm
              env:
                  npm_config_manage_package_manager_versions: 'false'
