name: Deploy Registry

on:
    push:
        branches:
            - main
        paths:
            - 'apps/registry-server/**'
            - 'packages/cli/**'
            - 'registry/**'
            - 'registry-releases/**'
            - 'registry.json'
            - 'registry.schema.json'
            - 'uekit.schema.json'
            - 'scripts/verify-registry.mjs'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'package.json'
            - '.node-version'
            - '.github/workflows/deploy-registry.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: github-pages
    cancel-in-progress: false

jobs:
    build:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Refuse disabled TLS verification
              run: node scripts/check-secure-environment.mjs

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  cache: pnpm
                  package-manager-cache: false

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Registry
              run: pnpm registry:build

            - name: Verify Registry artifact
              run: pnpm registry:verify

            - name: Configure GitHub Pages
              uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
              with:
                  path: apps/registry-server/dist

    deploy:
        needs: build
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

            - name: Checkout verification script
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Verify deployed Registry
              env:
                  PAGE_URL: ${{ steps.deployment.outputs.page_url }}
              run: |
                  REGISTRY_URL="${PAGE_URL%/}/web/v1"
                  node scripts/verify-registry.mjs --url "$REGISTRY_URL"

            - name: Verify custom Registry domain
              run: node scripts/verify-registry.mjs --url https://registry.uekit.com/web/v1
