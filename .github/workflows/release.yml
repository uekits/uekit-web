name: Release npm Package

on:
    workflow_dispatch:
        inputs:
            dist_tag:
                description: npm dist-tag used for this release
                required: true
                default: next
                type: choice
                options:
                    - next
                    - latest

permissions:
    contents: read

concurrency:
    group: npm-release
    cancel-in-progress: false

jobs:
    publish:
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        environment:
            name: npm
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Validate release source
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                      exit 0
                  fi
                  if [[ ! "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                      echo "npm releases are restricted to main or semantic version tags." >&2
                      exit 1
                  fi
                  PACKAGE_VERSION="$(node -p "require('./packages/cli/package.json').version")"
                  if [[ "$GITHUB_REF" != "refs/tags/v${PACKAGE_VERSION}" ]]; then
                      echo "Tag ${GITHUB_REF#refs/tags/} does not match package version ${PACKAGE_VERSION}." >&2
                      exit 1
                  fi

            - name: Refuse disabled TLS verification
              run: node scripts/check-secure-environment.mjs

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version-file: .node-version
                  registry-url: https://registry.npmjs.org
                  package-manager-cache: false

            - name: Install pinned npm for OIDC trusted publishing
              run: npm install --global npm@11.18.0

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify release candidate
              run: pnpm check && pnpm smoke:package

            - name: Publish changed packages
              run: pnpm changeset publish --tag "${{ inputs.dist_tag }}"
              env:
                  NPM_CONFIG_PROVENANCE: 'true'
