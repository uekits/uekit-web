name: Release npm Package

on:
    workflow_dispatch:
        inputs:
            dist_tag:
                description: npm dist-tag used for this release
                required: true
                default: next
                type: choice
                options:
                    - next
                    - latest

permissions:
    contents: read

concurrency:
    group: npm-release
    cancel-in-progress: false

jobs:
    publish:
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        environment:
            name: npm
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Validate release source
              shell: bash
              run: |
                  set -euo pipefail
                  DIST_TAG="${{ inputs.dist_tag }}"
                  PACKAGE_VERSION="$(node -p "require('./packages/cli/package.json').version")"

                  if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                      if [[ "$DIST_TAG" == "latest" ]]; then
                          echo "latest releases require a protected version tag." >&2
                          exit 1
                      fi
                      exit 0
                  fi
                  if [[ ! "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                      echo "npm releases are restricted to main or semantic version tags." >&2
                      exit 1
                  fi
                  if [[ "$GITHUB_REF" != "refs/tags/v${PACKAGE_VERSION}" ]]; then
                      echo "Tag ${GITHUB_REF#refs/tags/} does not match package version ${PACKAGE_VERSION}." >&2
                      exit 1
                  fi
                  if [[ "$DIST_TAG" == "latest" && "$PACKAGE_VERSION" == *-* ]]; then
                      echo "Prerelease versions cannot be published to latest." >&2
                      exit 1
                  fi

            - name: Refuse disabled TLS verification
              run: node scripts/check-secure-environment.mjs

            - name: Set up pnpm
              uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  package-manager-cache: false

            - name: Install pinned npm for OIDC trusted publishing
              run: npm install --global npm@11.18.0

            - name: Require OIDC-only publishing
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ -n "${NODE_AUTH_TOKEN:-}" || -n "${NPM_TOKEN:-}" ]]; then
                      echo "Traditional npm publish tokens are forbidden; use OIDC trusted publishing." >&2
                      exit 1
                  fi

            - name: Ensure package version is unpublished
              shell: bash
              run: |
                  set -euo pipefail
                  PACKAGE_VERSION="$(node -p "require('./packages/cli/package.json').version")"
                  PACKAGE_SPEC="@uekits/web@${PACKAGE_VERSION}"
                  if OUTPUT="$(npm view "$PACKAGE_SPEC" version 2>&1)"; then
                      echo "${PACKAGE_SPEC} is already published and cannot be overwritten." >&2
                      exit 1
                  fi
                  if ! grep -Eq 'E404|404 Not Found' <<<"$OUTPUT"; then
                      echo "$OUTPUT" >&2
                      exit 1
                  fi

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify release candidate
              run: pnpm check && pnpm smoke:package

            - name: Publish changed packages
              run: pnpm changeset publish --tag "${{ inputs.dist_tag }}"
              env:
                  NPM_CONFIG_PROVENANCE: 'true'
