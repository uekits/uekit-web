name: Security

on:
    pull_request:
    push:
        branches: [main]
    schedule:
        - cron: '23 3 * * 1'

permissions:
    contents: read

jobs:
    dependency-review:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0

            - name: Detect the initial dependency graph bootstrap
              id: dependency-graph
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
              run: |
                  if git cat-file -e "${BASE_SHA}:pnpm-lock.yaml" 2>/dev/null; then
                      echo "bootstrap=false" >> "${GITHUB_OUTPUT}"
                  else
                      echo "bootstrap=true" >> "${GITHUB_OUTPUT}"
                  fi

            - name: Review dependency changes
              if: steps.dependency-graph.outputs.bootstrap == 'false'
              uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
              with:
                  fail-on-severity: high

            # The comparison API has no base snapshot until the first lockfile reaches main.
            - name: Set up pnpm for the initial dependency audit
              if: steps.dependency-graph.outputs.bootstrap == 'true'
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Set up Node.js for the initial dependency audit
              if: steps.dependency-graph.outputs.bootstrap == 'true'
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version-file: .node-version
                  package-manager-cache: false

            - name: Audit the initial dependency graph
              if: steps.dependency-graph.outputs.bootstrap == 'true'
              run: pnpm audit --audit-level high

    codeql:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            packages: read
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - name: Initialize CodeQL
              uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
              with:
                  languages: javascript-typescript
            - name: Analyze
              uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
